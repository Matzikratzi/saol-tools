<!doctype html>
<html lang="sv">
<head>
  <meta charset="utf-8"><meta name="viewport" content="width=device-width, initial-scale=1">
  <title>SAOL-tools – artiklar</title>
  <style>
    :root{font-family:system-ui,sans-serif;color:#1d2a22;background:#edf2ee}*{box-sizing:border-box}body{margin:0}header{background:#285c3a;color:#fff;padding:.8rem 1rem;display:flex;gap:.7rem;align-items:center;flex-wrap:wrap}header h1{font-size:1.2rem;margin:0 auto 0 0}button,input{font:inherit;padding:.48rem .65rem}button{cursor:pointer;border:0;border-radius:.35rem}.primary{background:#f4cb4d;color:#222;font-weight:700}.secondary{background:#dce7df}.danger{background:#f4d2cf;color:#6d1710}.train{background:#b9d8ff;color:#123b65;font-weight:700}main{display:grid;grid-template-columns:minmax(300px,1.05fr) minmax(420px,.95fr);gap:1rem;padding:1rem;height:calc(100vh - 66px)}.panel{background:#fff;border-radius:.55rem;box-shadow:0 2px 10px #0002;overflow:hidden;display:flex;flex-direction:column}.toolbar{padding:.65rem;border-bottom:1px solid #ddd;display:flex;gap:.5rem;align-items:center;flex-wrap:wrap}#scan-wrap{overflow:auto;text-align:center;padding:.6rem;flex:1}#scan-stage{display:inline-block;position:relative;line-height:0}#scan{display:block;max-width:100%;height:auto}#highlight{display:none;position:absolute;border:3px solid #e11d48;background:transparent;box-shadow:0 0 0 2px #fff8;pointer-events:none;border-radius:4px;z-index:2}#word-list{overflow:auto;flex:1;padding:.7rem}.column-heading{margin:.7rem 0 .45rem;padding:.35rem .5rem;background:#edf2ee;border-left:4px solid #285c3a;font-weight:700}.column-heading:first-child{margin-top:0}.article{border:1px solid #ccd5cf;border-radius:.45rem;padding:.55rem;margin-bottom:.55rem}.article.selected{outline:3px solid #e11d48}.article.suspicious{border-color:#c0392b}.article.unresolved{background:#fff8e6;border:2px solid #d97706}.article-top{display:grid;grid-template-columns:5rem 1fr auto;gap:.4rem}.article input{width:100%;border:1px solid #bbb;border-radius:.3rem}.label{font-size:.75rem;color:#555;margin-bottom:.15rem}.delete{background:#f0dddd;align-self:end}.ocr-conflict{margin-top:.5rem;padding:.5rem;background:#fff;border:1px solid #e3b341;border-radius:.35rem;display:flex;align-items:center;gap:.4rem;flex-wrap:wrap}.ocr-conflict strong{margin-right:.2rem}.ocr-choice{background:#f3e7bf;border:1px solid #c89b20}.ocr-choice.chosen{background:#bfe3c8;border-color:#438a55}.hint{padding:.55rem .8rem;border-top:1px solid #ddd;font-size:.88rem;color:#555}#message{min-width:12rem}@media(max-width:900px){main{grid-template-columns:1fr;height:auto}.panel{min-height:65vh}.article-top{grid-template-columns:4rem 1fr auto}}
  </style>
</head>
<body>
<header><h1>SAOL-tools – artiklar och spelord</h1><button class="secondary" id="prev">←</button><label>Sida <input id="page" type="number" min="19" value="19" style="width:6rem"></label><button class="secondary" id="load">Öppna/importera</button><button class="danger" id="reimport">Importera om</button><button class="secondary" id="next">→</button><button class="train" id="train">Träna på 19–28</button><span id="model"></span><span id="message"></span></header>
<main><section class="panel"><div class="toolbar"><strong>Skannad sida</strong> <a id="source" target="_blank" rel="noopener">Öppna hos Runeberg</a></div><div id="scan-wrap"><div id="scan-stage"><img id="scan" alt="Skannad SAOL-sida"><div id="highlight" aria-hidden="true"></div></div></div></section><section class="panel"><div class="toolbar"><input id="name" placeholder="Ditt namn"><button class="secondary" id="add">+ Lägg till artikel</button><button class="secondary" id="save">Spara utkast</button><button class="primary" id="approve">Godkänn sida</button><button class="secondary" id="export">Exportera till olsbogo</button></div><div id="word-list"></div><div class="hint">Vid en verklig OCR-konflikt visas båda förslagen. Välj ett av dem eller skriv själv. Sidan kan inte godkännas förrän alla konflikter är lösta.</div></section></main>
<script>
const $=id=>document.getElementById(id);let current=null;let selectedRow=null;
function msg(text,error=false){$('message').textContent=text;$('message').style.color=error?'#ffd1d1':'white'}
async function json(url,options={}){const r=await fetch(url,options);const d=await r.json().catch(()=>({}));if(!r.ok)throw new Error(d.detail||r.statusText);return d}
function bboxFromRow(row){const values=['left','top','width','height'].map(key=>Number(row.dataset[key]));return values.every(Number.isFinite)&&values[2]>0&&values[3]>0?{left:values[0],top:values[1],width:values[2],height:values[3]}:null}
function clearHighlight(){if(selectedRow)selectedRow.classList.remove('selected');selectedRow=null;$('highlight').style.display='none'}
function highlightRow(row,{scrollList=false}={}){if(!row)return;if(selectedRow&&selectedRow!==row)selectedRow.classList.remove('selected');selectedRow=row;row.classList.add('selected');if(scrollList)row.scrollIntoView({behavior:'smooth',block:'nearest'});const box=bboxFromRow(row),marker=$('highlight');if(!box){marker.style.display='none';return}const image=$('scan');if(!image.naturalWidth||!image.clientWidth){marker.style.display='none';return}const scaleX=image.clientWidth/image.naturalWidth,scaleY=image.clientHeight/image.naturalHeight;const padX=Math.max(6,box.height*.45)*scaleX,padY=Math.max(4,box.height*.30)*scaleY;marker.style.left=`${Math.max(0,box.left*scaleX-padX)}px`;marker.style.top=`${Math.max(0,box.top*scaleY-padY)}px`;marker.style.width=`${Math.max(12,box.width*scaleX+2*padX)}px`;marker.style.height=`${Math.max(12,box.height*scaleY+2*padY)}px`;marker.style.display='block';marker.scrollIntoView({behavior:'smooth',block:'center',inline:'center'})}
function navigateSelected(step){const rows=[...document.querySelectorAll('.article')];if(!rows.length)return;let index=selectedRow?rows.indexOf(selectedRow):-1;if(index<0)index=step>0?-1:rows.length;index=Math.max(0,Math.min(rows.length-1,index+step));const row=rows[index];highlightRow(row,{scrollList:true});row.focus({preventScroll:true})}
function median(values){const ordered=values.filter(Number.isFinite).sort((a,b)=>a-b);if(!ordered.length)return 0;const middle=Math.floor(ordered.length/2);return ordered.length%2?ordered[middle]:(ordered[middle-1]+ordered[middle])/2}
function columnOrderedWords(items){const positioned=items.filter(w=>Number.isFinite(Number(w.bbox_left))&&Number.isFinite(Number(w.bbox_width)));if(positioned.length<4)return items.map(w=>({...w,column:0}));const pageLeft=Math.min(...positioned.map(w=>Number(w.bbox_left)));const pageRight=Math.max(...positioned.map(w=>Number(w.bbox_left)+Number(w.bbox_width)));const split=pageLeft+(pageRight-pageLeft)/2;return items.map(w=>({...w,column:Number(w.bbox_left)<split?0:1})).sort((a,b)=>(a.column-b.column)||(Number(a.bbox_top??1e9)-Number(b.bbox_top??1e9))||(Number(a.bbox_left??1e9)-Number(b.bbox_left??1e9)))}
function saneHighlightBoxes(items){const result=items.map(w=>({...w}));for(const column of [0,1]){const group=result.filter(w=>w.column===column&&[w.bbox_left,w.bbox_width,w.bbox_height].every(v=>Number.isFinite(Number(v)))&&Number(w.bbox_width)>0&&Number(w.bbox_height)>0);if(group.length<4)continue;const start=median(group.map(w=>Number(w.bbox_left))),height=median(group.map(w=>Number(w.bbox_height)));const charWidths=group.filter(w=>(w.word||'').length>=3).map(w=>Number(w.bbox_width)/Math.max(1,(w.word||'').length)).filter(v=>v>1),charWidth=median(charWidths)||height*.55,startTolerance=Math.max(18,height*2.4);for(const word of group){const left=Number(word.bbox_left),width=Number(word.bbox_width),wordLength=Math.max(1,(word.word||'').replace(/[^A-Za-zÅÄÖåäöÀÁÉàáé-]/g,'').length),expectedWidth=Math.max(height*.7,charWidth*wordLength),badStart=Math.abs(left-start)>startTolerance,badWidth=width<expectedWidth*.32||width>expectedWidth*3.2;if(badStart)word.bbox_left=Math.round(start);if(badStart||badWidth)word.bbox_width=Math.round(Math.max(height*.8,expectedWidth))}}return result}
function addHeading(text){const h=document.createElement('div');h.className='column-heading';h.textContent=text;$('word-list').append(h)}
function field(label){const wrap=document.createElement('label');const title=document.createElement('div');title.className='label';title.textContent=label;const control=document.createElement('input');wrap.append(title,control);return {wrap,control}}
function resolveConflict(row,value){row._controls.head.value=value;row._ocr.resolved=true;row.classList.remove('unresolved');row.querySelectorAll('.ocr-choice').forEach(button=>button.classList.toggle('chosen',button.dataset.value===value));highlightRow(row)}
function addRow(data={}){const unresolved=Boolean(data.ocr_conflict&&!data.ocr_resolved);const row=document.createElement('div');row.className='article'+(data.suspicious?' suspicious':'')+(unresolved?' unresolved':'');row.tabIndex=0;const hasBox=[data.bbox_left,data.bbox_top,data.bbox_width,data.bbox_height].every(v=>v!==null&&v!==undefined);if(hasBox){row.dataset.left=data.bbox_left;row.dataset.top=data.bbox_top;row.dataset.width=data.bbox_width;row.dataset.height=data.bbox_height}const top=document.createElement('div');top.className='article-top';const sense=field('Nr');sense.control.type='number';sense.control.min='1';sense.control.value=data.sense_number??'';const head=field('Uppslagsord');head.control.value=data.word||'';head.control.spellcheck=false;const del=document.createElement('button');del.className='delete';del.textContent='Ta bort';del.type='button';del.onclick=e=>{e.stopPropagation();if(selectedRow===row)clearHighlight();row.remove()};top.append(sense.wrap,head.wrap,del);row.append(top);row._controls={sense:sense.control,head:head.control};row._hidden={word_class:data.word_class||'',inflection_raw:data.inflection_raw||'',forms:data.forms||[]};row._ocr={tesseract:data.ocr_tesseract||'',runeberg:data.ocr_runeberg||'',conflict:Boolean(data.ocr_conflict),resolved:Boolean(data.ocr_resolved)};if(row._ocr.conflict){const box=document.createElement('div');box.className='ocr-conflict';const title=document.createElement('strong');title.textContent='⚠ OCR-konflikt:';box.append(title);for(const [source,value] of [['Runeberg',row._ocr.runeberg],['Tesseract',row._ocr.tesseract]]){if(!value)continue;const button=document.createElement('button');button.type='button';button.className='ocr-choice'+(row._ocr.resolved&&head.control.value===value?' chosen':'');button.dataset.value=value;button.textContent=`${source}: ${value}`;button.onclick=e=>{e.stopPropagation();resolveConflict(row,value)};box.append(button)}row.append(box)}head.control.addEventListener('input',()=>{if(row._ocr.conflict){row._ocr.resolved=true;row.classList.remove('unresolved');row.querySelectorAll('.ocr-choice').forEach(button=>button.classList.toggle('chosen',button.dataset.value===head.control.value))}});row.addEventListener('click',()=>highlightRow(row));row.addEventListener('focus',()=>highlightRow(row));[sense.control,head.control].forEach(c=>c.addEventListener('focus',()=>highlightRow(row)));$('word-list').append(row);return head.control}
function show(data){current=data.page_number;$('page').value=current;clearHighlight();$('scan').src=data.image_url;$('source').href=data.source_url;$('name').value=data.verified_by||localStorage.corrector||'';$('word-list').innerHTML='';const ordered=saneHighlightBoxes(columnOrderedWords(data.words||[]));let last=-1;ordered.forEach(w=>{if(w.column!==last){addHeading(w.column===0?'Vänster kolumn':'Höger kolumn');last=w.column}addRow(w)});const conflicts=ordered.filter(w=>w.ocr_conflict&&!w.ocr_resolved).length;msg(`Sida ${current}: ${data.words.length} artiklar${conflicts?` – ${conflicts} OCR-konflikt${conflicts===1?'':'er'}`:''}${data.status==='approved'?' – godkänd':''}`)}
function words(){return[...document.querySelectorAll('.article')].map(row=>{const c=row._controls,hidden=row._hidden,ocr=row._ocr,box=bboxFromRow(row);return{word:c.head.value.trim(),sense_number:c.sense.value?Number(c.sense.value):null,word_class:hidden.word_class,inflection_raw:hidden.inflection_raw,forms:hidden.forms,bbox_left:box?.left??null,bbox_top:box?.top??null,bbox_width:box?.width??null,bbox_height:box?.height??null,ocr_tesseract:ocr.tesseract,ocr_runeberg:ocr.runeberg,ocr_conflict:ocr.conflict,ocr_resolved:ocr.resolved}}).filter(x=>x.word)}
async function modelStatus(){try{const d=await json('/api/model');$('model').textContent=d.trained?`Modell: ${d.positive_samples}/${d.samples}`:'Modell: ej tränad'}catch{$('model').textContent=''}}
async function importPage(force=false){const n=Number($('page').value);msg(force?'Importerar om…':'Importerar…');try{show(await json('/api/pages/import',{method:'POST',headers:{'Content-Type':'application/json'},body:JSON.stringify({page_number:n,force})}))}catch(e){msg(e.message,true)}}
async function openPage(){const n=Number($('page').value);msg('Hämtar…');try{show(await json(`/api/pages/${n}`))}catch{await importPage(false)}}
async function save(status){if(!current)return;try{localStorage.corrector=$('name').value;show(await json(`/api/pages/${current}`,{method:'PUT',headers:{'Content-Type':'application/json'},body:JSON.stringify({words:words(),status,verified_by:$('name').value})}));msg(status==='approved'?'Sidan godkänd':'Utkast sparat')}catch(e){msg(e.message,true)}}
$('scan').addEventListener('load',()=>{if(selectedRow)highlightRow(selectedRow)});window.addEventListener('resize',()=>{if(selectedRow)highlightRow(selectedRow)});document.addEventListener('keydown',event=>{if(event.key!=='ArrowUp'&&event.key!=='ArrowDown')return;const target=event.target;if(target.matches('input, textarea, [contenteditable="true"]'))return;if(!selectedRow&&!target.closest?.('.article'))return;event.preventDefault();navigateSelected(event.key==='ArrowDown'?1:-1)});$('load').onclick=openPage;$('reimport').onclick=()=>importPage(true);$('prev').onclick=()=>{$('page').value=Math.max(19,Number($('page').value)-1);openPage()};$('next').onclick=()=>{$('page').value=Number($('page').value)+1;openPage()};$('add').onclick=()=>addRow().focus();$('save').onclick=()=>save('started');$('approve').onclick=()=>save('approved');$('train').onclick=async()=>{msg('Tränar…');try{const d=await json('/api/model/train',{method:'POST'});msg(`Tränad: ${d.positive_samples}/${d.samples}`);modelStatus()}catch(e){msg(e.message,true)}};$('export').onclick=async()=>{try{const d=await json('/api/export',{method:'POST'});msg(`${d.word_count} spelord exporterade`);location.href=d.download_url}catch(e){msg(e.message,true)}};modelStatus();openPage();
</script></body></html>
