<!doctype html>
<html lang="sv">
<head>
  <meta charset="utf-8"><meta name="viewport" content="width=device-width, initial-scale=1">
  <title>SAOL-tools – ordlista</title>
  <style>
    :root{font-family:system-ui,sans-serif;color:#1d2a22;background:#edf2ee}*{box-sizing:border-box}body{margin:0}header{background:#285c3a;color:#fff;padding:.8rem 1rem;display:flex;gap:.7rem;align-items:center;flex-wrap:wrap}header h1{font-size:1.2rem;margin:0 auto 0 0}button,input{font:inherit;padding:.48rem .65rem}button{cursor:pointer;border:0;border-radius:.35rem}.primary{background:#f4cb4d;color:#222;font-weight:700}.secondary{background:#dce7df}.danger{background:#f4d2cf;color:#6d1710}main{display:grid;grid-template-columns:minmax(300px,1.05fr) minmax(340px,.95fr);gap:1rem;padding:1rem;height:calc(100vh - 66px)}.panel{background:#fff;border-radius:.55rem;box-shadow:0 2px 10px #0002;overflow:hidden;display:flex;flex-direction:column}.toolbar{padding:.65rem;border-bottom:1px solid #ddd;display:flex;gap:.5rem;align-items:center;flex-wrap:wrap}#scan-wrap{overflow:auto;text-align:center;padding:.6rem;flex:1}#scan{max-width:100%;height:auto}#word-list{overflow:auto;flex:1;padding:.7rem}.word-row{display:grid;grid-template-columns:1fr auto;gap:.45rem;margin-bottom:.45rem}.word-row input{width:100%;border:1px solid #bbb;border-radius:.3rem}.word-row.suspicious input{border:2px solid #c0392b;background:#fff4f2}.delete{background:#f0dddd}.hint{padding:.55rem .8rem;border-top:1px solid #ddd;font-size:.88rem;color:#555}#message{min-width:12rem}@media(max-width:800px){main{grid-template-columns:1fr;height:auto}.panel{min-height:65vh}}
  </style>
</head>
<body>
<header><h1>SAOL-tools – bygg ordlista</h1><button class="secondary" id="prev">←</button><label>Sida <input id="page" type="number" min="19" value="19" style="width:6rem"></label><button class="secondary" id="load">Öppna/importera</button><button class="danger" id="reimport">Importera om</button><button class="secondary" id="next">→</button><span id="message"></span></header>
<main><section class="panel"><div class="toolbar"><strong>Skannad sida</strong> <a id="source" target="_blank" rel="noopener">Öppna hos Runeberg</a></div><div id="scan-wrap"><img id="scan" alt="Skannad SAOL-sida"></div></section><section class="panel"><div class="toolbar"><input id="name" placeholder="Ditt namn"><button class="secondary" id="add">+ Lägg till ord</button><button class="secondary" id="save">Spara utkast</button><button class="primary" id="approve">Godkänn sida</button><button class="secondary" id="export">Exportera ordlista</button></div><div id="word-list"></div><div class="hint">Bara orden sparas. Runebergs OCR används tillfälligt vid import och lagras inte i databasen. Röda rader bör kontrolleras mot bilden. ”Importera om” ersätter orden på en ej godkänd sida.</div></section></main>
<script>
const $=id=>document.getElementById(id);let current=null;function msg(text,error=false){$('message').textContent=text;$('message').style.color=error?'#ffd1d1':'white'}async function json(url,options={}){const r=await fetch(url,options);const d=await r.json().catch(()=>({}));if(!r.ok)throw new Error(d.detail||r.statusText);return d}function addRow(word='',suspicious=false){const row=document.createElement('div');row.className='word-row'+(suspicious?' suspicious':'');const input=document.createElement('input');input.value=word;input.autocomplete='off';input.spellcheck=false;input.oninput=()=>row.classList.remove('suspicious');const del=document.createElement('button');del.className='delete';del.textContent='Ta bort';del.onclick=()=>row.remove();row.append(input,del);$('word-list').append(row);return input}function show(data){current=data.page_number;$('page').value=current;$('scan').src=data.image_url;$('source').href=data.source_url;$('name').value=data.verified_by||localStorage.corrector||'';$('word-list').innerHTML='';(data.words||[]).forEach(w=>addRow(w.word,Boolean(w.suspicious)));msg(`Sida ${current}: ${data.words.length} ord${data.status==='approved'?' – godkänd':''}`)}function words(){return[...document.querySelectorAll('.word-row input')].map(i=>({word:i.value.trim()})).filter(x=>x.word)}async function importPage(force=false){const n=Number($('page').value);msg(force?'Importerar om…':'Importerar…');try{show(await json('/api/pages/import',{method:'POST',headers:{'Content-Type':'application/json'},body:JSON.stringify({page_number:n,force})}))}catch(e){msg(e.message,true)}}async function openPage(){const n=Number($('page').value);msg('Hämtar…');try{show(await json(`/api/pages/${n}`))}catch{await importPage(false)}}async function save(status){if(!current)return;try{localStorage.corrector=$('name').value;show(await json(`/api/pages/${current}`,{method:'PUT',headers:{'Content-Type':'application/json'},body:JSON.stringify({words:words(),status,verified_by:$('name').value})}));msg(status==='approved'?'Sidan godkänd':'Utkast sparat')}catch(e){msg(e.message,true)}}$('load').onclick=openPage;$('reimport').onclick=()=>importPage(true);$('prev').onclick=()=>{$('page').value=Math.max(19,Number($('page').value)-1);openPage()};$('next').onclick=()=>{$('page').value=Number($('page').value)+1;openPage()};$('add').onclick=()=>addRow().focus();$('save').onclick=()=>save('started');$('approve').onclick=()=>save('approved');$('export').onclick=async()=>{try{const d=await json('/api/export',{method:'POST'});msg(`${d.word_count} ord exporterade`);location.href=d.download_url}catch(e){msg(e.message,true)}};openPage();
</script></body></html>
